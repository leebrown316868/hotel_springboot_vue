server:
  port: 8080

spring:
  application:
    name: hotel-management

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hotel_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: Yblhurtgta123.

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:your-secret-key-min-256-bits-long-for-hs256-algorithm-please-change-in-production}
  expiration: 2592000000

payment:
  alipay:
    app-id: ${ZHIHUI_APP_ID}
    private-key: ${ZHIHUI_PRIVATE_KEY}
    alipay-public-key: ${ZHIHUI_PUBLIC_KEY}
    gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
    notify-url: ${ALIPAY_NOTIFY_URL:https://tied-safely-chips-bugs.trycloudflare.com/api/payment/alipay/notify}
    return-url: ${ALIPAY_RETURN_URL:http://localhost:3000/payment/result}

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.hotel: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
