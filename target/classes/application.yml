server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: hotel-management

  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/hotel.db

  jpa:
    database-platform: com.hotel.config.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: com.hotel.config.SQLiteDialect

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:your-secret-key-min-256-bits-long-for-hs256-algorithm-please-change-in-production}
  expiration: 2592000000

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.hotel: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
